<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — AI Resume Analyser</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<div class="container" style="max-width:620px">

  <header style="margin-bottom:24px;text-align:center">
    <div class="badge"><span class="dot"></span> AI Career Coach</div>
    <h1 style="font-size:32px">Resume Chat</h1>
    <p class="subtitle">Ask short questions, get clear answers.</p>
  </header>

  <!-- Quick buttons -->
  <div class="quick-prompts">
    <button class="qp-btn" onclick="sendQuick('How to improve my ATS score?')">📈 ATS Score</button>
    <button class="qp-btn" onclick="sendQuick('What skills should I add?')">🛠 Skills</button>
    <button class="qp-btn" onclick="sendQuick('Give me a better summary in 2 lines.')">✍️ Summary</button>
    <button class="qp-btn" onclick="sendQuick('My biggest weakness?')">⚠️ Weakness</button>
  </div>

  <!-- Chat window -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-msg ai">
      <div class="chat-avatar">🤖</div>
      <div class="chat-bubble">Hi! I've read your resume. Ask me anything — I'll keep my answers short and clear. 😊</div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="Type your question..."
           onkeydown="if(event.key==='Enter') sendMessage()"/>
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">Send</button>
  </div>

  <div style="text-align:center;margin-top:14px">
    <a href="/" style="color:var(--muted);font-size:12px;text-decoration:none">↩ New Analysis</a>
  </div>

</div>

<script>
let chatHistory = [];

function sendQuick(msg) {
  document.getElementById('chatInput').value = msg;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  appendMsg('user', msg);
  input.value = '';
  chatHistory.push({ role: 'user', content: msg });

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '...';
  appendTyping();

  try {
    const res = await fetch('/chat/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: chatHistory.slice(-6) })
    });
    const data = await res.json();
    removeTyping();

    const reply = data.error ? '❌ ' + data.error : data.reply;
    appendMsg('ai', reply);
    if (!data.error) chatHistory.push({ role: 'assistant', content: reply });

  } catch {
    removeTyping();
    appendMsg('ai', '❌ Network error. Try again.');
  }

  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
}

function appendMsg(role, text) {
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  // Clean any markdown before displaying
  const clean = text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/#{1,6}\s/g, '')
    .replace(/\n{2,}/g, '\n');
  div.innerHTML = `
    <div class="chat-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="chat-bubble">${escapeHtml(clean).replace(/\n/g,'<br>')}</div>
  `;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function appendTyping() {
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'chat-msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="chat-avatar">🤖</div>
    <div class="chat-bubble typing-bubble"><span></span><span></span><span></span></div>
  `;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</body>
</html>
